<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ProKid</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050505;
    color: #f0f0f0;
    font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
  }
  .container { max-width: 500px; }
  .code {
    font-family: 'Outfit', sans-serif;
    font-size: 8rem;
    font-weight: 800;
    letter-spacing: -4px;
    background: linear-gradient(135deg, #ff3c00, #d4a853);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin-bottom: 20px;
  }
  h1 { font-size: 1.5rem; font-weight: 500; margin-bottom: 15px; }
  p { color: #888; font-size: 1rem; margin-bottom: 30px; line-height: 1.6; }
  a {
    display: inline-block;
    padding: 14px 40px;
    background: linear-gradient(135deg, #ff3c00, #ff6b2b);
    color: #fff;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 600;
    font-size: 0.9rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: opacity 0.3s;
  }
  a:hover { opacity: 0.85; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500&family=Outfit:wght@800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
